apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: voting-app-postgres
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/tu-usuario/voting-app-gitops.git
    targetRevision: HEAD
    path: k8s/postgres
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
