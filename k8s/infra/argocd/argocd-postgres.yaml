apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: voting-app-postgres
  namespace: argo-cd
spec:
  project: default
  source:
    repoURL: https://github.com/AgustinLandriel/gitops-voting-app.git
    targetRevision: HEAD
    path: k8s/postgres
  destination:
    server: https://kubernetes.default.svc
    namespace: voting-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
